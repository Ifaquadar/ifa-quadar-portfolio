<section class="proj-root">

  <div class="proj-header">
    <div>
      <div class="proj-label">Portfolio</div>
      <h2 class="proj-h2">Selected <em>projects</em></h2>
    </div>
    <div class="proj-filter">
      <button
        *ngFor="let f of filters"
        class="filter-btn"
        [class.active]="activeFilter === f.value"
        (click)="setFilter(f.value)">
        {{ f.label }}
      </button>
    </div>
  </div>

  <div class="proj-grid">
    <div
      *ngFor="let p of filteredProjects"
      class="proj-card"
      [class.featured]="p.featured && activeFilter === 'all'">

      <div class="proj-card-banner" [ngClass]="p.bannerClass">
        {{ p.emoji }}
      </div>

      <div class="proj-card-body">
        <div class="proj-card-top">
          <span class="proj-domain" [ngClass]="p.domainClass">{{ p.domainLabel }}</span>
          <div class="proj-links">
            <a *ngIf="p.githubUrl" [href]="p.githubUrl" target="_blank" class="proj-link" title="GitHub">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
              </svg>
            </a>
            <a *ngIf="p.liveUrl" [href]="p.liveUrl" target="_blank" class="proj-link" title="Live">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </a>
          </div>
        </div>

        <div class="proj-card-title">{{ p.title }}</div>
        <div class="proj-card-desc">{{ p.description }}</div>

        <div class="proj-tags">
          <span class="proj-tag" *ngFor="let tag of p.tags">{{ tag }}</span>
        </div>
      </div>
    </div>
  </div>

</section>
