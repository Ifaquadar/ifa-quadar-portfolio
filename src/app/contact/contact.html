<section class="ct-root">

  <div class="ct-header">
    <div class="ct-label">Contact</div>
    <h2 class="ct-h2">Let’s <em>connect</em></h2>
  </div>

  <div class="ct-grid">

    <!-- Left: Info -->
    <div class="ct-info">

      <div class="ct-card">
        <div class="ct-item">
          <div class="ct-icon ic-orange">📧</div>
          <div>
            <div class="ct-item-title">Email</div>
            <div class="ct-item-value">ifaquadar@gmail.com</div>
          </div>
        </div>

        <div class="ct-item">
          <div class="ct-icon ic-blue">💼</div>
          <div>
            <div class="ct-item-title">LinkedIn</div>
            <div class="ct-item-value">https://www.linkedin.com/in/ifaquadar/</div>
          </div>
        </div>

        <div class="ct-item">
          <div class="ct-icon ic-green"><img class="ct-icon-img" src="/assets/github-icon.svg" alt="Github"></div>
          <div>
            <div class="ct-item-title">Github</div>
            <div class="ct-item-value">https://github.com/ifaquadar</div>
          </div>
        </div>
      </div>

    </div>

    <!-- Right: Form -->
    <div class="ct-form-wrap">

      <form (ngSubmit)="onSubmit(f)" #f="ngForm" name="contact" netlify data-netlify="true"
        netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="contact" />
        <input type="hidden" name="bot-field" />
        <div class="ct-field">
          <label>Name</label>
          <input type="text" placeholder="Your name" name="name" ngModel required>
        </div>

        <div class="ct-field">
          <label>Email</label>
          <input type="email" placeholder="you@example.com" name="email" ngModel required>
        </div>

        <div class="ct-field">
          <label>Message</label>
          <textarea rows="4" placeholder="Write your message..." name="message" ngModel required></textarea>
        </div>

        <button type="submit" class="ct-btn">Send message</button>

      </form>

    </div>

  </div>

</section>
